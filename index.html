<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Convite Alice 15 Anos</title>

  <meta name="description" content="Convite especial de 15 anos da Alice." />
  <meta name="theme-color" content="#13051f" />

  <style>
    :root {
      --bg: #13051f;
      --silver: #f4f1ff;
      --purple: #7b36ff;
      --purple-2: #b67cff;
      --glass: rgba(24, 8, 42, 0.72);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background:
        linear-gradient(rgba(5, 0, 12, 0.16), rgba(5, 0, 12, 0.22)),
        url("assets/fundo-horizontal.jpg") center center / cover no-repeat;
      overflow: hidden;
    }

    .video-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      height: 100dvh;
      width: calc(100dvh * 9 / 16);
      max-width: 100vw;
      max-height: 100dvh;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      box-shadow:
        0 0 42px rgba(160, 90, 255, 0.42),
        0 0 120px rgba(80, 20, 140, 0.35);
      overflow: hidden;
      z-index: 2;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      pointer-events: none;
      user-select: none;
      display: block;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background:
        linear-gradient(rgba(8, 2, 16, 0.24), rgba(8, 2, 16, 0.68)),
        url("assets/fundo-horizontal.jpg") center center / cover no-repeat;
      text-align: center;
      transition: opacity 700ms ease, visibility 700ms ease;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-card {
      width: min(92vw, 420px);
      padding: 28px 22px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 28px;
      background: rgba(18, 5, 35, 0.58);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.42),
        inset 0 0 34px rgba(167, 105, 255, 0.18);
      backdrop-filter: blur(8px);
    }

    .start-title {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 10vw, 54px);
      letter-spacing: 0.06em;
      line-height: 0.95;
      color: var(--silver);
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.45),
        0 0 22px rgba(177, 113, 255, 0.55);
    }

    .start-subtitle {
      margin: 0 0 22px;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.88);
    }

    .start-button,
    .action-button {
      appearance: none;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      color: white;
      font-weight: 700;
      letter-spacing: 0.02em;
      background:
        linear-gradient(145deg, #f8efff 0%, #b884ff 22%, #6622b8 50%, #d9b7ff 76%, #5d1ca6 100%);
      box-shadow:
        0 0 20px rgba(177, 113, 255, 0.65),
        inset 0 1px 0 rgba(255, 255, 255, 0.58),
        inset 0 -10px 24px rgba(46, 0, 88, 0.36);
      border-radius: 999px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }

    .start-button {
      width: 100%;
      min-height: 56px;
      font-size: 17px;
      padding: 16px 22px;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
    }

    .loading {
      position: absolute;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 9;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }

    .loading.visible {
      opacity: 1;
    }

    /* ================================
   BOTÕES FINAIS EM PNG
   Ajuste aqui tamanho e posição
================================ */

.actions {
  --buttons-bottom: 28px;
  --button-width: 180px;
  --button-gap: 6px;

  --confirmar-x: 0px;
  --confirmar-y: 0px;

  --localizacao-x: 0px;
  --localizacao-y: 0px;

  --presente-x: 0px;
  --presente-y: 0px;

  position: absolute;
  left: 50%;
  bottom: max(var(--buttons-bottom), env(safe-area-inset-bottom));
  z-index: 8;

  width: min(96vw, 520px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: var(--button-gap);

  padding: 0;
  background: transparent;
  border: 0;
  box-shadow: none;
  backdrop-filter: none;

  opacity: 0;
  visibility: hidden;
  pointer-events: none;

  transform: translate(-50%, 28px);
  transition: opacity 650ms ease, transform 650ms ease, visibility 650ms ease;
}

.actions.visible {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transform: translate(-50%, 0);
}

.action-button {
  appearance: none;
  border: 0;
  padding: 0;
  margin: 0;

  width: var(--button-width);
  height: auto;

  display: block;
  background: transparent;
  box-shadow: none;
  border-radius: 0;

  cursor: pointer;
  text-decoration: none;
}

.action-button img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
  pointer-events: none;
  user-select: none;

  filter:
    drop-shadow(0 0 12px rgba(185, 110, 255, 0.65))
    drop-shadow(0 8px 18px rgba(0, 0, 0, 0.42));
}

#confirmarBtn {
  transform: translate(var(--confirmar-x), var(--confirmar-y));
}

#localBtn {
  transform: translate(var(--localizacao-x), var(--localizacao-y));
}

#pixBtn {
  transform: translate(var(--presente-x), var(--presente-y));
}

/* Ajuste para telas menores */
@media (max-width: 480px) {
  .actions {
    --buttons-bottom: 18px;
    --button-width: 102px;
    --button-gap: -2px;
    width: 100vw;
  }
}

/* Ajuste para telas muito pequenas */
@media (max-width: 380px) {
  .actions {
    --button-width: 92px;
    --button-gap: -4px;
  }
}

/* Ajuste para telas horizontais / desktop */
@media (min-width: 900px) {
  .actions {
    --buttons-bottom: 32px;
    --button-width: 132px;
    --button-gap: 10px;
  }
}
    }

    .actions.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    .action-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 16px;
      font-size: 15px;
      text-align: center;
    }

    .pix-modal {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(5, 0, 12, 0.72);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 280ms ease, visibility 280ms ease;
    }

    .pix-modal.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .pix-card {
      width: min(92vw, 420px);
      max-height: min(88dvh, 760px);
      overflow: auto;
      padding: 20px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(163, 103, 255, 0.24), transparent 45%),
        rgba(16, 4, 32, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.62);
      text-align: center;
    }

    .pix-card h2 {
      margin: 2px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--silver);
      font-size: 28px;
      line-height: 1.05;
      text-shadow: 0 0 18px rgba(177, 113, 255, 0.55);
    }

    .pix-card p {
      margin: 8px 0 14px;
      color: rgba(255, 255, 255, 0.86);
      line-height: 1.4;
      font-size: 14px;
    }

    .pix-card img {
      width: min(72vw, 290px);
      height: auto;
      background: white;
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 0 24px rgba(191, 130, 255, 0.62);
    }

    .pix-key {
      width: 100%;
      margin: 14px 0 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 13px;
      word-break: break-all;
      user-select: text;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .secondary-button {
      min-height: 46px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    @media (min-width: 680px) {
      .actions {
        grid-template-columns: repeat(3, 1fr);
      }

      .action-button {
        min-height: 58px;
      }
    }

    @media (max-aspect-ratio: 9 / 16) {
      .video-frame {
        width: 100vw;
        height: calc(100vw * 16 / 9);
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="video-frame">
      <video
        id="conviteVideo"
        src="assets/convite-alice.mp4"
        poster="assets/poster.jpg"
        preload="auto"
        playsinline
        webkit-playsinline
        disablepictureinpicture
        controlslist="nodownload noplaybackrate noremoteplayback"
      ></video>
    </div>

    <section id="startScreen" class="start-screen">
      <div class="start-card">
        <h1 class="start-title">ALICE<br><span style="font-size: .58em;">15 ANOS</span></h1>
        <p class="start-subtitle">Toque para abrir a magia do convite.</p>
        <button id="startButton" class="start-button" type="button">Abrir convite</button>
      </div>
    </section>

    <div id="loading" class="loading">carregando convite...</div>

    <nav id="actions" class="actions" aria-label="Ações do convite">
  <a id="confirmarBtn" class="action-button" target="_blank" rel="noopener" aria-label="Confirmar Presença">
    <img src="assets/confirmar-presenca.png" alt="Confirmar Presença" />
  </a>

  <a id="localBtn" class="action-button" target="_blank" rel="noopener" aria-label="Localização">
    <img src="assets/localizacao.png" alt="Localização" />
  </a>

  <button id="pixBtn" class="action-button" type="button" aria-label="Sugestões de Presente">
    <img src="assets/sugestao-presente.png" alt="Sugestões de Presente" />
  </button>
</nav>

    <section id="pixModal" class="pix-modal" aria-modal="true" role="dialog">
      <div class="pix-card">
        <h2>Sugestão de Presente</h2>
        <p>Faça um Pix do tamanho do seu presente usando o QR Code abaixo.</p>

        <img src="assets/qr-pix.png" alt="QR Code Pix" />

        <div id="pixKeyBox" class="pix-key">CHAVE_PIX_AQUI</div>

        <p>Após o Pix, envie o comprovante para identificação.</p>

        <div class="modal-actions">
          <button id="copyPixBtn" class="secondary-button" type="button">Copiar chave Pix</button>
          <button id="closePixBtn" class="secondary-button" type="button">Voltar ao convite</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const CONFIG = {
      whatsappNumber: "5586994501773",
      whatsappMessage: "Olá! Recebi o convite dos 15 anos da Alice e confirmo minha presença. Meu nome é:",
      googleMapsUrl: "https://www.google.com/maps/place/Aconchego+Eventos/@-4.998573,-42.8320761,1099m/data=!3m1!1e3!4m6!3m5!1s0x78e3ff072d5a05b:0xa9ea2c23e8944ec3!8m2!3d-4.9985749!4d-42.8320845!16s%2Fg%2F11q4x_jlr8?hl=pt-BR&entry=ttu&g_ep=EgoyMDI2MDUxMi4wIKXMDSoASAFQAw%3D%3D",
      pixKey: "00020126580014br.gov.bcb.pix013695dae6ad-b353-41cf-a30e-6d4888f7c2135204000053039865802BR5925FRANCISCA LUCIA DE SOUSA 6009SAO PAULO62070503***6304E871"
    };

    const video = document.getElementById("conviteVideo");
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const loading = document.getElementById("loading");
    const actions = document.getElementById("actions");
    const confirmarBtn = document.getElementById("confirmarBtn");
    const localBtn = document.getElementById("localBtn");
    const pixBtn = document.getElementById("pixBtn");
    const pixModal = document.getElementById("pixModal");
    const closePixBtn = document.getElementById("closePixBtn");
    const copyPixBtn = document.getElementById("copyPixBtn");
    const pixKeyBox = document.getElementById("pixKeyBox");

    confirmarBtn.href = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(CONFIG.whatsappMessage)}`;
    localBtn.href = CONFIG.googleMapsUrl;
    pixKeyBox.textContent = CONFIG.pixKey;

    let started = false;
    let finished = false;

    function showActions() {
      finished = true;
      actions.classList.add("visible");
    }

    async function startExperience() {
      if (started) return;

      started = true;
      loading.classList.add("visible");

      try {
        video.currentTime = 0;
        video.muted = false;
        video.controls = false;
        await video.play();
        startScreen.classList.add("hidden");
      } catch (error) {
        try {
          video.muted = true;
          await video.play();
          startScreen.classList.add("hidden");
        } catch (secondError) {
          started = false;
          alert("Toque novamente para iniciar o convite.");
        }
      } finally {
        loading.classList.remove("visible");
      }
    }

    startButton.addEventListener("click", startExperience);

    video.addEventListener("ended", () => {
      video.pause();
      showActions();
    });

    video.addEventListener("pause", () => {
      if (started && !finished && video.currentTime > 0 && video.currentTime < video.duration) {
        video.play().catch(() => {});
      }
    });

    video.addEventListener("seeking", () => {
      if (started && !finished && video.currentTime > 0) {
        video.currentTime = Math.min(video.currentTime, video.duration || video.currentTime);
      }
    });

    document.addEventListener("contextmenu", (event) => event.preventDefault());

    pixBtn.addEventListener("click", () => {
      pixModal.classList.add("visible");
    });

    closePixBtn.addEventListener("click", () => {
      pixModal.classList.remove("visible");
    });

    pixModal.addEventListener("click", (event) => {
      if (event.target === pixModal) {
        pixModal.classList.remove("visible");
      }
    });

    copyPixBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(CONFIG.pixKey);
        copyPixBtn.textContent = "Chave copiada!";
        setTimeout(() => copyPixBtn.textContent = "Copiar chave Pix", 1800);
      } catch (error) {
        alert("Não foi possível copiar automaticamente. Toque e segure na chave Pix para copiar.");
      }
    });
  </script>
</body>
</html>
